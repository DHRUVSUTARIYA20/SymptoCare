<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SymptoCare | Sign in</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Space+Grotesk:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-grid"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <header class="topbar">
      <div class="logo">SymptoCare</div>
    </header>

    <main class="shell">
      <section class="panel auth">
        <div class="auth-card">
          <h1 class="auth-title auth-title-center">Login</h1>

          <form id="signInForm" class="form-stack is-active" autocomplete="on">
            <label>
              Email
              <input type="email" name="email" placeholder="you@example.com" required />
            </label>
            <label>
              Password
              <input type="password" name="password" placeholder="••••••••" required />
            </label>
            <button class="primary-btn" type="submit">Sign in</button>
          </form>
          <p id="authStatus" class="form-status" role="status" aria-live="polite"></p>

          <p class="auth-footer">
            New here?
            <a class="auth-link" href="signup.html">Create an account</a>
          </p>
        </div>
      </section>
    </main>

    <script src="config.js"></script>
    <script src="auth.js"></script>
  </body>
</html>
